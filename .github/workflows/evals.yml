name: Evaluation Tests

on:
  pull_request:
    paths:
      - 'backend/app/agent/**'
      - 'backend/evals/**'
      - '.github/workflows/evals.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/app/agent/**'
      - 'backend/evals/**'
      - '.github/workflows/evals.yml'

jobs:
  discovery-evaluation:
    name: Discovery Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SST_RESOURCE_Bookings: '{"name":"test-table"}'
      SST_RESOURCE_RestaurantKB: '{"id":"test-kb-id"}'
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run Discovery Evaluation
        working-directory: backend
        run: |
          PYTHONPATH=.:evals/new-evals uv run python evals/new-evals/discovery/eval.py

      - name: Check Evaluation Results
        if: always()
        working-directory: backend
        run: |
          EVAL_FILE=$(ls -t experiment_files/eval_*.json 2>/dev/null | head -1)
          if [ -z "$EVAL_FILE" ]; then
            echo "❌ ERROR: No evaluation results found"
            exit 1
          fi
          echo "📊 Latest evaluation: $EVAL_FILE"

      - name: Upload Evaluation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-discovery
          path: backend/experiment_files/
          retention-days: 30
