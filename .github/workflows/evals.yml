name: Evals

on:
  # Run on every PR targeting main — catches regressions before merge.
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
  # Run on push to main — establishes the new baseline experiment in Braintrust
  # that future PRs are compared against.
  push:
    branches: [main]
    paths:
      - "backend/**"
  # Manual trigger for ad-hoc runs (e.g. after a prompt or model change).
  workflow_dispatch:

# One concurrent run per branch/PR — cancels a stale run if a new commit is
# pushed before the previous run finishes.
concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: Agent Evals
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed for Braintrust to post experiment results as a PR comment.
      pull-requests: write
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      # Minimal SST resource stubs so config.py imports without a live deployment.
      # Evals mock all tool I/O so no real DynamoDB or Knowledge Base is needed.
      SST_RESOURCE_Bookings: '{"name":"eval-table"}'
      SST_RESOURCE_RestaurantKB: '{"id":"eval-kb-id"}'
      SST_RESOURCE_AgentSessions: '{"name":"eval-sessions"}'

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dev dependencies
        run: uv sync --frozen --group dev
        working-directory: backend

      # -----------------------------------------------------------------------
      # Step 1 — Strands Evals (local, no platform dependency)
      # Runs the existing pytest-based evals. These work without a Braintrust
      # API key and save results to experiment_files/ for local inspection.
      # -----------------------------------------------------------------------
      - name: Run Strands agent evals
        id: strands-evals
        run: uv run pytest tests/evals/ -m agent -v --tb=short 2>&1 | tee /tmp/strands-eval-results.txt
        working-directory: backend

      - name: Post Strands eval summary
        if: always()
        run: |
          echo "## Strands Agent Eval Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/strands-eval-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # -----------------------------------------------------------------------
      # Step 2 — Braintrust Evals (platform-tracked, experiment comparison)
      # Pushes results to Braintrust for diff-against-baseline and UI review.
      # Requires BRAINTRUST_API_KEY secret to be set in the repository.
      # Each run creates a named experiment tagged with the commit SHA so
      # regressions are traceable back to the triggering change.
      # -----------------------------------------------------------------------
      - name: Run Braintrust evals
        if: always()
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          PYTHONPATH: "."
        run: |
          uv run braintrust eval \
            evals/braintrust/eval_output_quality.py \
            evals/braintrust/eval_trajectory.py \
            2>&1 | tee /tmp/braintrust-eval-results.txt
        working-directory: backend

      - name: Post Braintrust eval summary
        if: always()
        run: |
          echo "## Braintrust Eval Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/braintrust-eval-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
