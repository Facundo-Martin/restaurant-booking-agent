name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "claude-context/**"
      - "*.md"
      - "kb-documents/**"
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # 1. Lint — ruff (format + lint) + pylint on backend/app/
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/pyproject.toml

      - name: Install dev dependencies
        run: uv sync --frozen --group dev
        working-directory: backend

      - name: ruff check
        run: uv run ruff check .
        working-directory: backend

      - name: ruff format check
        run: uv run ruff format --check .
        working-directory: backend

      - name: pylint
        run: uv run pylint app/ --rcfile=pyproject.toml
        working-directory: backend

  # -------------------------------------------------------------------------
  # 2. Unit tests — fast, no AWS calls (moto + mocks)
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/pyproject.toml

      - name: Install dev dependencies
        run: uv sync --frozen --group dev
        working-directory: backend

      - name: Run unit tests
        run: uv run pytest tests/unit/ -q
        working-directory: backend

  # -------------------------------------------------------------------------
  # 3. SST diff — surfaces infra changes on every PR before merge
  # -------------------------------------------------------------------------
  sst-diff:
    name: SST Diff (staging)
    needs: unit-tests
    # Only run on pull requests — no point diffing on direct pushes to branches
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post the comment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sst diff
        id: diff
        # continue-on-error so the comment step always runs, even if diff fails
        # (e.g. stack does not exist yet on first deploy)
        run: npx sst diff --stage staging 2>&1 | tee /tmp/sst-diff.txt
        continue-on-error: true

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/sst-diff.txt', 'utf8').slice(0, 60_000);
            const body = `## SST Diff — staging\n\`\`\`\n${diff}\n\`\`\`\n\n> Generated by [CI #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            // Update existing comment if one exists (keeps PR timeline clean)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## SST Diff'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
